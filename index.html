<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global Strategic Monitor - 2026 Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; color: #0f0; overflow: hidden; }
        #map { flex: 3.5; background: #000 !important; cursor: crosshair; }
        
        /* 📺 ციფრული ეკრანის ეფექტი */
        #map::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 1000; background-size: 100% 3px, 3px 100%; pointer-events: none; }

        #info-panel { flex: 1.5; padding: 20px; background: #050505; border-left: 2px solid #ffaa00; display: flex; flex-direction: column; overflow-y: auto; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        h2 { color: #ffaa00; text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #ffaa00; padding-bottom: 10px; text-shadow: 0 0 10px #ffaa00; }
        
        .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .clock-box { background: #111; padding: 10px; border: 1px solid #333; text-align: center; }
        .clock-time { font-family: 'Courier New', monospace; color: #fff; font-size: 1em; font-weight: bold; }

        /* 🔴 ციმციმა წერტილები */
        .war-pulse { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 15px #ff0000; animation: flash 1s infinite; }
        @keyframes flash { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.5); box-shadow: 0 0 25px #ff0000; } 100% { opacity: 1; transform: scale(1); } }

        /* 💫 მოძრავი ხაზების ანიმაცია */
        .flow-line { stroke-dasharray: 10, 15; animation: flow 30s linear infinite; filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5)); }
        .aid-line { stroke-dasharray: 5, 10; animation: flow 40s linear reverse infinite; filter: drop-shadow(0 0 5px rgba(255, 170, 0, 0.5)); }
        @keyframes flow { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }

        .strike-card { background: #0a0a0a; border: 1px solid #ff4444; border-left: 5px solid #ff4444; padding: 15px; margin-bottom: 15px; animation: glowPulse 2s infinite; }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px #ff444400; } 50% { box-shadow: 0 0 10px #ff444455; } 100% { box-shadow: 0 0 5px #ff444400; } }
        
        .label-style { color: #fff; background: rgba(0,0,0,0.8); border: 1px solid #ff4444; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .news-container { flex-grow: 1; background: #000; border: 1px solid #222; min-height: 300px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="info-panel">
        <h2>Strategic Hub</h2>
        <div class="clock-grid" id="clocks"></div>
        <button onclick="shareLink()" style="width:100%; padding:12px; background:#ffaa00; color:#000; font-weight:bold; border:none; cursor:pointer; border-radius:4px; margin-bottom:15px;">🚀 SHARE SYSTEM ACCESS</button>
        <div id="details"></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // საათების განახლება
        function updateClocks() {
            const zones = [ {n:'WASHINGTON', z:'America/New_York'}, {n:'KYIV', z:'Europe/Kyiv'}, {n:'TBILISI', z:'Asia/Tbilisi'}, {n:'BEIJING', z:'Asia/Shanghai'} ];
            document.getElementById('clocks').innerHTML = zones.map(z => `
                <div class="clock-box"><span style="font-size:0.6em;color:#ffaa00">${z.n}</span><div class="clock-time">${new Date().toLocaleTimeString('en-GB',{timeZone:z.z, hour12:false})}</div></div>
            `).join('');
        }
        setInterval(updateClocks, 1000); updateClocks();

        var map = L.map('map', { zoomControl: false }).setView([20, 10], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const hubs = { USA:[38.9,-77.0], EU:[50.8,4.3], CHINA:[39.9,116.4], IRAN:[35.7,51.3], RUSSIA:[55.7,37.6], TURKEY:[39.9,32.8], UK:[51.5,-0.1] };

        const data = [
            { f:"რუსეთი", t:"უკრაინა", p:[[55.7,37.6],[50.4,30.5]], q:"Ukraine war frontline", s:"ომი", aid:[{h:"USA",d:"ATACMS & Intelligence"},{h:"UK",d:"Storm Shadow Missiles"},{h:"EU",d:"Financial Support"}] },
            { f:"რუსეთი", t:"საქართველო", p:[[43.5,39.5],[42.5,41.5]], q:"Georgia occupation news", s:"ოკუპაცია", aid:[{h:"USA",d:"Strategic Defense"}] },
            { f:"ისრაელი", t:"ღაზა", p:[[31.7,35.2],[31.4,34.4]], q:"Gaza conflict live", s:"ომი", aid:[{h:"USA",d:"Air Defense Support"}] },
            { f:"ისრაელი", t:"ლიბანი", p:[[33.1,35.5],[33.8,35.5]], q:"Lebanon Israel border", s:"ესკალაცია", aid:[{h:"IRAN",d:"Hezbollah Supplies"}] },
            { f:"ირანი", t:"ისრაელი", p:[[32.6,51.6],[32.0,34.8]], q:"Iran Israel missile", s:"სარაკეტო ომი", aid:[{h:"USA",d:"Iron Dome Support"}] },
            { f:"იემენი", t:"წითელი ზღვა", p:[[15.3,44.2],[15.0,42.0]], q:"Houthi Red Sea", s:"ბლოკადა", aid:[{h:"IRAN",d:"Drone Technology"}] },
            { f:"ჩინეთი", t:"ტაივანი", p:[[26.0,119.3],[25.0,121.5]], q:"Taiwan Strait tension", s:"ბლოკადა", aid:[{h:"USA",d:"Pacific Security Pact"}] },
            { f:"ჩრდ. კორეა", t:"სამხ. კორეა", p:[[39.0,125.7],[37.5,127.0]], q:"DMZ tension news", s:"საფრთხე", aid:[{h:"USA",d:"Nuclear Shield"},{h:"RUSSIA",d:"Tech Exchange"}] },
            { f:"აზერბაიჯანი", t:"სომხეთი", p:[[40.4,49.8],[40.1,44.5]], q:"Armenia Azerbaijan", s:"დაძაბულობა", aid:[{h:"TURKEY",d:"Military Cooperation"}] },
            { f:"სუდანი", t:"შიდა ომი", p:[[15.5,32.5],[12.0,24.0]], q:"Sudan civil war", s:"ომი", aid:[{h:"RUSSIA",d:"Wagner Group Interests"}] },
            { f:"კონგო", t:"M23 ამბოხებულები", p:[[-1.5,29.2],[-2.5,28.8]], q:"DRC Congo M23", s:"ომი", aid:[{h:"EU",d:"Humanitarian Aid"}] },
            { f:"ხუნტა", t:"მიანმარი", p:[[19.7,96.1],[22.0,95.0]], q:"Myanmar civil war", s:"ომი", aid:[{h:"CHINA",d:"Junta Support"}] },
            { f:"ვენესუელა", t:"გაიანა", p:[[7.5,-66.5],[6.8,-59.5]], q:"Essequibo crisis", s:"დავა", aid:[{h:"USA",d:"Military Drills"}] },
            { f:"სერბეთი", t:"კოსოვო", p:[[44.8,20.4],[42.6,21.1]], q:"Kosovo Serbia news", s:"კრიზისი", aid:[{h:"USA",d:"KFOR Peacekeepers"}] }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        data.forEach(conf => {
            // 🔴 კონფლიქტის ხაზი (ნეონის წითელი)
            const line = L.polyline(conf.p, { color:'#ff0000', weight:3, opacity:0.8, className:'flow-line' }).addTo(map);
            const clickArea = L.polyline(conf.p, { color:'transparent', weight:20 }).addTo(map);

            const showConf = () => {
                document.getElementById('details').innerHTML = `<div class="strike-card"><div class="status-tag" style="background:#ff0000;color:#000">${conf.s}</div><h3 style="color:#ff4444;margin:0">${conf.f} ➔ ${conf.t}</h3></div>`;
                loadNews(conf.q);
            };
            line.on('click', showConf); clickArea.on('click', showConf);

            // 🟡 დახმარების ხაზები (ნეონის ნარინჯისფერი)
            if(conf.aid) {
                conf.aid.forEach(a => {
                    const aidLine = L.polyline([hubs[a.h], conf.p[1]], { color:'#ffaa00', weight:2, opacity:0.6, className:'aid-line' }).addTo(map);
                    const aidClick = L.polyline([hubs[a.h], conf.p[1]], { color:'transparent', weight:15 }).addTo(map);
                    
                    const showAid = (e) => {
                        L.DomEvent.stopPropagation(e);
                        document.getElementById('details').innerHTML = `<div class="strike-card" style="border-color:#ffaa00;border-left-color:#ffaa00"><div class="status-tag" style="background:#ffaa00;color:#000">დახმარება</div><h3 style="color:#ffaa00;margin:0">${a.h} ➔ ${conf.t}</h3><p style="color:#ccc;margin-top:5px;font-size:0.9em">${a.d}</p></div>`;
                        loadNews(a.h + " aid to " + conf.t);
                    };
                    aidLine.on('click', showAid); aidClick.on('click', showAid);
                });
            }

            // წერტილები
            L.marker(conf.p[1], { icon: L.divIcon({ className:'war-pulse', iconSize:[12,12] }) }).addTo(map);
            L.marker(conf.p[0], { icon: L.divIcon({ className:'label-style', html: conf.f }) }).addTo(map);
        });

        Object.keys(hubs).forEach(h => {
            L.marker(hubs[h], { icon: L.divIcon({ className:'label-style', html:'★ '+h, style:'border-color:#ffaa00;color:#ffaa00' }) }).addTo(map);
        });

        function shareLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("სისტემის ბმული კოპირებულია!");
        }
    </script>
</body>
</html>
