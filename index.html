<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global Strategic Monitor - 2026 Ultimate</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; background: #010101; color: #00ff00; overflow: hidden; }
        #map { flex: 3.5; border-right: 1px solid #333; position: relative; cursor: crosshair; }
        #map::after { content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 1000; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        #info-panel { flex: 1.5; padding: 15px; background: #050505; overflow-y: auto; display: flex; flex-direction: column; border-left: 2px solid #ffaa00; z-index: 1001; }
        h2 { color: #ffaa00; border-bottom: 2px solid #ffaa00; padding-bottom: 8px; font-size: 1.1em; text-transform: uppercase; text-align: center; text-shadow: 0 0 10px #ffaa00; margin-top: 0; }
        .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 15px; }
        .clock-time { font-family: 'Courier New', monospace; color: #fff; font-size: 0.85em; text-align: center; }
        .share-btn { width: 100%; background: #ffaa00; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 15px; text-transform: uppercase; }
        .strike-card { background: #0d0d0d; padding: 12px; border: 1px solid #ff4444; border-radius: 4px; margin-bottom: 12px; border-left: 5px solid #ff4444; animation: slideIn 0.2s ease-out; }
        .aid-card { border-left-color: #ffaa00 !important; border-color: #ffaa00 !important; }
        .status-tag { display: inline-block; padding: 2px 6px; background: #ff4444; color: #000; font-weight: bold; font-size: 0.6em; border-radius: 2px; margin-bottom: 5px; }
        .aid-tag { background: #ffaa00 !important; }
        .news-container { flex-grow: 1; border: 1px solid #222; background: #000; min-height: 300px; }
        iframe { width: 100%; height: 100%; border: none; }
        .label-style { background: rgba(0,0,0,0.85); border: 1px solid #444; color: #00ff00; padding: 1px 4px; font-size: 8px; border-radius: 2px; white-space: nowrap; }
        .pulse { border-radius: 50%; height: 8px; width: 8px; background: #ff4444; position: absolute; box-shadow: 0 0 10px #ff4444; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { transform: scale(0.9); opacity: 1; } 70% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(0.9); opacity: 0; } }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="info-panel">
        <h2>🛰️ STRATEGIC MONITOR</h2>
        <div class="clock-grid" id="clocks"></div>
        <button class="share-btn" onclick="shareLink()">🚀 SHARE MONITOR</button>
        <div id="details"></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const clocks = [
            { id: 'dc', name: 'WASHINGTON', tz: 'America/New_York' },
            { id: 'ky', name: 'KYIV', tz: 'Europe/Kyiv' },
            { id: 'tb', name: 'TBILISI', tz: 'Asia/Tbilisi' },
            { id: 'bj', name: 'BEIJING', tz: 'Asia/Shanghai' }
        ];

        function updateClocks() {
            let html = '';
            const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            clocks.forEach(c => {
                const time = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: c.tz });
                html += `<div><span style="color:#ffaa00;font-size:0.6em">${c.name}</span><div class="clock-time">${time}</div></div>`;
            });
            document.getElementById('clocks').innerHTML = html;
        }
        setInterval(updateClocks, 1000); updateClocks();

        var map = L.map('map').setView([25, 15], 2.5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const hubs = { USA: [38.9, -77.0], EU: [50.8, 4.3], CHINA: [39.9, 116.4], IRAN: [35.7, 51.3], RUSSIA: [55.7, 37.6], TURKEY: [39.9, 32.8] };

        const data = [
            { from: "რუსეთი", to: "უკრაინა", path: [[55.7, 37.6], [50.4, 30.5]], q: "Ukraine war", status: "ომი", support: [{hub:"USA", d:"HIMARS, ATACMS"}, {hub:"EU", d:"ტანკები, ფინანსები"}] },
            { from: "რუსეთი", to: "საქართველო", path: [[43.5, 39.5], [42.5, 41.5]], q: "Occupation Georgia", status: "ოკუპაცია", support: [{hub:"USA", d:"სტრატეგიული დახმარება"}] },
            { from: "აზერბაიჯანი", to: "სომხეთი", path: [[40.4, 49.8], [40.1, 44.5]], q: "Armenia Azerbaijan", status: "დაძაბულობა", support: [{hub:"TURKEY", d:"Bayraktar დრონები"}] },
            { from: "ირანი", to: "ისრაელი", path: [[32.6, 51.6], [32.0, 34.8]], q: "Israel Iran war", status: "ესკალაცია", support: [{hub:"USA", d:"Iron Dome, THAAD"}] },
            { from: "ჩინეთი", to: "ტაივანი", path: [[26.0, 119.3], [25.0, 121.5]], q: "Taiwan news", status: "ბლოკადა", support: [{hub:"USA", d:"თავდაცვითი შეიარაღება"}] },
            { from: "იემენი", to: "წითელი ზღვა", path: [[15.3, 44.2], [15.0, 42.0]], q: "Houthi attacks", status: "ბლოკადა", support: [{hub:"IRAN", d:"სარაკეტო ტექნოლოგია"}] },
            { from: "ისრაელი", to: "ლიბანი", path: [[31.7, 35.2], [33.8, 35.5]], q: "Hezbollah Israel", status: "ომი", support: [{hub:"IRAN", d:"სამხედრო ლოგისტიკა"}] },
            { from: "ჩრდ. კორეა", to: "სამხ. კორეა", path: [[39.0, 125.7], [37.5, 127.0]], q: "Korea tension", status: "საფრთხე", support: [{hub:"USA", d:"ბირთვული შეკავება"}, {hub:"RUSSIA", d:"სამხედრო თანამშრომლობა"}] },
            { from: "სერბეთი", to: "კოსოვო", path: [[44.8, 20.4], [42.6, 21.1]], q: "Kosovo Serbia", status: "კრიზისი", support: [{hub:"USA", d:"NATO KFOR მისია"}] },
            { from: "სუდანი", to: "შიდა ომი", path: [[15.5, 32.5], [14.0, 25.0]], q: "Sudan war", status: "ომი", support: [{hub:"RUSSIA", d:"Wagner ჯგუფის ინტერესები"}] },
            { from: "ვენესუელა", to: "გაიანა", path: [[7.5, -66.5], [6.8, -59.5]], q: "Essequibo", status: "დავა", support: [{hub:"USA", d:"სამხედრო წვრთნები"}] },
            { from: "ეკვადორი", to: "კარტელები", path: [[-0.2, -78.5], [-2.2, -79.8]], q: "Ecuador war", status: "ომი", support: [{hub:"USA", d:"უსაფრთხოების აღჭურვილობა"}] },
            { from: "ხუნტა", to: "მიანმარი", path: [[19.7, 96.1], [22.0, 95.0]], q: "Myanmar news", status: "ომი", support: [{hub:"CHINA", d:"ეკონომიკური ზურგი"}] },
            { from: "ეთიოპია", to: "სომალი", path: [[9.0, 38.7], [2.0, 45.3]], q: "Ethiopia Somalia", status: "დავა", support: [{hub:"TURKEY", d:"საზღვაო თავდაცვის პაქტი"}] }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        data.forEach(s => {
            // 🔴 კონფლიქტის ხაზი (მოძრავი) + უხილავი სქელი ხაზი დაწკაპუნებისთვის
            const warLine = L.polyline(s.path, {color: '#ff4444', weight: 3, opacity: 0.8, dashArray: '8, 12'}).addTo(map);
            const invisibleWar = L.polyline(s.path, {color: 'transparent', weight: 20}).addTo(map); // <--- აი ეს აადვილებს დაჭერას

            const showWar = () => {
                document.getElementById('details').innerHTML = `<div class="strike-card"><div class="status-tag">${s.status}</div><h3 style="color:#ff4444;margin:0;">${s.from} ➔ ${s.to}</h3></div>`;
                loadNews(s.q);
            };
            warLine.on('click', showWar); invisibleWar.on('click', showWar);

            // 🟡 მხარდაჭერის ხაზები (მოძრავი) + უხილავი სქელი ხაზები
            if(s.support) {
                s.support.forEach(sup => {
                    const hubPos = hubs[sup.hub];
                    const supLine = L.polyline([hubPos, s.path[1]], {color: '#ffaa00', weight: 2, opacity: 0.5, dashArray: '5, 10'}).addTo(map);
                    const invisibleSup = L.polyline([hubPos, s.path[1]], {color: 'transparent', weight: 15}).addTo(map);

                    const showSup = (e) => {
                        L.DomEvent.stopPropagation(e);
                        document.getElementById('details').innerHTML = `<div class="strike-card aid-card"><div class="status-tag aid-tag">მხარდაჭერა</div><h3 style="color:#ffaa00;margin:0;">${sup.hub} ➔ ${s.to}</h3><p style="color:#eee;font-size:0.8em;margin-top:5px;">${sup.d}</p></div>`;
                        loadNews(sup.hub + " aid to " + s.to);
                    };
                    supLine.on('click', showSup); invisibleSup.on('click', showSup);
                });
            }

            // ინდიკატორები
            L.marker(s.path[1], {icon: L.divIcon({className: 'pulse', iconSize: [10, 10]})}).addTo(map);
            L.marker(s.path[0], {icon: L.divIcon({className: 'label-style', html: s.from})}).addTo(map);
        });

        Object.keys(hubs).forEach(h => {
            L.marker(hubs[h], {icon: L.divIcon({className: 'label-style', html: '★ ' + h, iconAnchor: [0,0]})}).addTo(map);
        });

        function shareLink() {
            const d = { title: 'Global Strategic Monitor', url: window.location.href };
            navigator.share ? navigator.share(d) : (navigator.clipboard.writeText(window.location.href), alert("ლინკი კოპირებულია!"));
        }
    </script>
</body>
</html>
